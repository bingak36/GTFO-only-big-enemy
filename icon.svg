<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="#1a1a2e"/>

  <!-- Glow effect behind enemy -->
  <ellipse cx="128" cy="160" rx="70" ry="20" fill="#ff3300" opacity="0.2"/>

  <!-- Big Enemy body -->
  <ellipse cx="128" cy="130" rx="55" ry="65" fill="#2d2d2d"/>

  <!-- Enemy head -->
  <circle cx="128" cy="75" r="38" fill="#3a3a3a"/>

  <!-- Eye glow left -->
  <circle cx="114" cy="72" r="10" fill="#ff3300" opacity="0.9"/>
  <circle cx="114" cy="72" r="6" fill="#ff6600"/>
  <circle cx="114" cy="72" r="3" fill="#ffffff"/>

  <!-- Eye glow right -->
  <circle cx="142" cy="72" r="10" fill="#ff3300" opacity="0.9"/>
  <circle cx="142" cy="72" r="6" fill="#ff6600"/>
  <circle cx="142" cy="72" r="3" fill="#ffffff"/>

  <!-- Arms -->
  <rect x="55" y="105" width="25" height="70" rx="12" fill="#2d2d2d"/>
  <rect x="176" y="105" width="25" height="70" rx="12" fill="#2d2d2d"/>

  <!-- Legs -->
  <rect x="100" y="185" width="22" height="45" rx="10" fill="#2d2d2d"/>
  <rect x="134" y="185" width="22" height="45" rx="10" fill="#2d2d2d"/>

  <!-- BIG text -->
  <text x="128" y="248" font-family="Arial Black, sans-serif" font-size="22" font-weight="900"
        text-anchor="middle" fill="#ff3300" letter-spacing="4">BIG</text>

  <!-- Border -->
  <rect width="256" height="256" fill="none" stroke="#ff3300" stroke-width="4" rx="16"/>
</svg>
